<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga Apps - BasterDP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6200ee;
            --secondary: #03dac6;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(180deg, #f1f3f4 0%, #e8eaed 100%);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 960px;
            width: 100%;
            background: rgba(255,255,255,0.96);
            padding: 36px;
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
            text-align: left;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 8px;
            color: #202124;
        }
        p.subtitle {
            font-size: 1rem;
            color: #5f6368;
            margin-bottom: 30px;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .app-card {
            background: white;
            border: 1px solid rgba(60,64,67,0.12);
            padding: 22px;
            border-radius: 20px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 16px;
            min-height: 240px;
        }
        .app-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 28px rgba(60,64,67,0.12);
            border-color: rgba(60,64,67,0.16);
        }
        .app-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .app-icon {
            width: 72px;
            height: 72px;
            border-radius: 22px;
            background: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            color: white;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            box-shadow: 0 12px 18px rgba(66, 133, 244, 0.18);
            overflow: hidden;
        }
        .app-icon img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .app-meta {
            display: grid;
            gap: 6px;
        }
        .app-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin: 0;
            color: #202124;
        }
        .app-subtitle {
            font-size: 0.95rem;
            color: #5f6368;
        }
        .app-description {
            font-size: 0.98rem;
            color: #5f6368;
            line-height: 1.55;
            margin: 0;
            flex-grow: 1;
        }
        .app-meta-data {
            display: none;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #1a73e8;
            color: white;
            padding: 12px 22px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: background 0.2s ease, transform 0.2s ease;
            margin-top: auto;
        }
        .btn:hover {
            background: #1558c0;
            transform: translateY(-1px);
        }
        .footer {
            margin-top: 28px;
            font-size: 0.9rem;
            color: #5f6368;
            text-align: center;
            width: 100%;
        }
        @media (max-width: 720px) {
            .container {
                padding: 28px 20px;
            }
            .app-header {
                gap: 12px;
            }
            .app-icon {
                width: 60px;
                height: 60px;
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aplicaciones</h1>
        <p class="subtitle">Selecciona una aplicación para descargarla.</p>
        
        <div id="app-list" class="app-grid">
            <!-- Las aplicaciones se cargarán dinámicamente aquí -->
            <p>Cargando aplicaciones...</p>
        </div>
    </div>
    <div class="footer">
        © 2026 BasterDP. Todos los derechos reservados.
    </div>

    <script>
        // Cargar la lista de aplicaciones desde apps.json
        fetch('apps.json')
            .then(response => response.json())
            .then(apps => {
                const appList = document.getElementById('app-list');
                appList.innerHTML = ''; // Limpiar el mensaje de carga

                apps.forEach(app => {
                    const card = document.createElement('div');
                    card.className = 'app-card';
                    
                    const header = document.createElement('div');
                    header.className = 'app-header';
                    
                    const icon = document.createElement('div');
                    icon.className = 'app-icon';
                    icon.textContent = app.name.slice(0, 2).toUpperCase();
                    
                    const logoImage = document.createElement('img');
                    logoImage.src = `./${app.path}logo.png?cache=${Date.now()}`;
                    logoImage.alt = `${app.name} logo`;
                    logoImage.onload = () => {
                        icon.innerHTML = '';
                        icon.appendChild(logoImage);
                    };
                    logoImage.onerror = () => {
                        logoImage.remove();
                    };
                    icon.appendChild(logoImage);
                    
                    const meta = document.createElement('div');
                    meta.className = 'app-meta';
                    
                    const name = document.createElement('div');
                    name.className = 'app-name';
                    name.textContent = app.name;
                    
                    const subtitle = document.createElement('div');
                    subtitle.className = 'app-subtitle';
                    subtitle.textContent = 'App Android disponible para descarga';

                    meta.appendChild(name);
                    meta.appendChild(subtitle);
                    header.appendChild(icon);
                    header.appendChild(meta);

                    const description = document.createElement('p');
                    description.className = 'app-description';
                    description.textContent = app.description;
                    
                    const link = document.createElement('a');
                    link.href = app.path;
                    link.className = 'btn';
                    link.textContent = 'Ver App';
                    
                    card.appendChild(header);
                    card.appendChild(description);
                    card.appendChild(link);
                    
                    appList.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error al cargar apps.json:', error);
                document.getElementById('app-list').innerHTML = '<p>Error al cargar aplicaciones.</p>';
            });
    </script>
</body>
</html>
