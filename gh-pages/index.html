<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descarga Apps - BasterDP</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6200ee;
            --secondary: #03dac6;
            --bg: #f5f5f7;
            --card: #ffffff;
            --text: #1d1d1f;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p.subtitle {
            font-size: 1.1rem;
            color: #6e6e73;
            margin-bottom: 30px;
        }
        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .app-card {
            background: #fdfdfd;
            border: 1px solid #eeeff2;
            padding: 20px;
            border-radius: 16px;
            transition: transform 0.2s;
            text-align: left;
        }
        .app-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }
        .app-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--primary);
        }
        .app-description {
            font-size: 1rem;
            color: #6e6e73;
            margin-bottom: 15px;
        }
        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #86868b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Aplicaciones</h1>
        <p class="subtitle">Selecciona una aplicación para descargarla.</p>
        
        <div id="app-list" class="app-grid">
            <!-- Las aplicaciones se cargarán dinámicamente aquí -->
            <p>Cargando aplicaciones...</p>
        </div>
    </div>
    <div class="footer">
        © 2026 BasterDP. Todos los derechos reservados.
    </div>

    <script>
        // Cargar la lista de aplicaciones desde apps.json
        fetch('apps.json')
            .then(response => response.json())
            .then(apps => {
                const appList = document.getElementById('app-list');
                appList.innerHTML = ''; // Limpiar el mensaje de carga

                apps.forEach(app => {
                    const card = document.createElement('div');
                    card.className = 'app-card';
                    
                    const name = document.createElement('div');
                    name.className = 'app-name';
                    name.textContent = app.name;
                    
                    const description = document.createElement('p');
                    description.className = 'app-description';
                    description.textContent = app.description;
                    
                    const link = document.createElement('a');
                    link.href = app.path;
                    link.className = 'btn';
                    link.textContent = 'Ver App';
                    
                    card.appendChild(name);
                    card.appendChild(description);
                    card.appendChild(link);
                    
                    appList.appendChild(card);
                });
            })
            .catch(error => {
                console.error('Error al cargar apps.json:', error);
                document.getElementById('app-list').innerHTML = '<p>Error al cargar aplicaciones.</p>';
            });
    </script>
</body>
</html>
